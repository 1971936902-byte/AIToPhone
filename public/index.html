<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AIToPhone" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#1f6f78" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <link rel="stylesheet" href="/styles.css?v=4" />
    <title>AIToPhone</title>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>AIToPhone</h1>
          <p id="statusText">未连接</p>
        </div>
        <button id="limitsBtn" class="icon-btn" title="查看用量">%</button>
      </header>

      <section class="panel setup">
        <label for="tokenInput">访问口令</label>
        <div class="token-row">
          <input id="tokenInput" type="password" autocomplete="current-password" placeholder="AUTH_TOKEN" />
          <button id="saveTokenBtn">保存</button>
        </div>

        <label for="projectSelect">项目目录</label>
        <div class="project-row">
          <select id="projectSelect"></select>
          <button id="newThreadBtn">开启</button>
        </div>
      </section>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer">
        <textarea id="messageInput" rows="2" placeholder="输入给 Codex 的消息"></textarea>
        <button id="sendBtn" type="submit">发送</button>
      </form>

      <dialog id="limitsDialog">
        <div class="dialog-head">
          <h2>用量</h2>
          <button id="closeLimitsBtn" class="icon-btn">×</button>
        </div>
        <pre id="limitsOutput"></pre>
      </dialog>
    </main>
    <script src="/app.js?v=4" type="module"></script>
  </body>
</html>
