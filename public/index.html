<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AIToPhone" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#1f6f78" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" />
    <link rel="stylesheet" href="/styles.css?v=6" />
    <title>AIToPhone</title>
  </head>
  <body>
    <main class="app">
      <aside id="drawer" class="drawer" aria-hidden="true">
        <div class="drawer-head">
          <div>
            <p class="eyebrow">Remote Codex</p>
            <h2>AIToPhone</h2>
          </div>
          <button id="closeDrawerBtn" class="icon-btn" title="关闭">×</button>
        </div>

        <section class="drawer-section">
          <div class="account-card">
            <div class="avatar mini">AI</div>
            <div>
              <strong id="accountName">账户未读取</strong>
              <span id="accountPlan">点击刷新账户信息</span>
            </div>
            <button id="refreshAccountBtn" class="ghost-btn">刷新</button>
          </div>
          <div id="usageCard" class="usage-card"></div>
        </section>

        <section class="drawer-section">
          <label for="gatewayInput">网关地址</label>
          <div class="token-row">
            <input id="gatewayInput" type="url" inputmode="url" placeholder="http://电脑虚拟IP:8787" />
            <button id="saveGatewayBtn">保存</button>
          </div>
          <p class="hint">网页版可留空；iOS App 内请填写蒲公英/Tailscale 地址。</p>
        </section>

        <section class="drawer-section">
          <label for="tokenInput">访问口令</label>
          <div class="token-row">
            <input id="tokenInput" type="password" autocomplete="current-password" placeholder="AUTH_TOKEN" />
            <button id="saveTokenBtn">保存</button>
          </div>
        </section>

        <section class="drawer-section">
          <div class="section-title">
            <span>项目和对话</span>
            <button id="newThreadBtn" class="ghost-btn">新建</button>
          </div>
          <select id="projectSelect"></select>
          <div id="conversationList" class="conversation-list"></div>
        </section>
      </aside>

      <div id="scrim" class="scrim"></div>

      <header class="topbar">
        <button id="openDrawerBtn" class="icon-btn menu-btn" title="项目和设置">☰</button>
        <div class="title-block">
          <h1 id="chatTitle">AIToPhone</h1>
          <p id="statusText">未连接</p>
        </div>
        <button id="limitsBtn" class="icon-btn" title="查看用量">%</button>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer">
        <button id="attachBtn" class="attach-btn" type="button" title="添加图片或文件">+</button>
        <input id="fileInput" type="file" multiple hidden />
        <div class="compose-main">
          <div id="attachmentTray" class="attachment-tray"></div>
        <textarea id="messageInput" rows="1" placeholder="输入给 Codex 的消息"></textarea>
        </div>
        <button id="sendBtn" type="submit">发送</button>
      </form>

      <dialog id="limitsDialog">
        <div class="dialog-head">
          <h2>用量</h2>
          <button id="closeLimitsBtn" class="icon-btn">×</button>
        </div>
        <pre id="limitsOutput"></pre>
      </dialog>
    </main>
    <script src="/app.js?v=6" type="module"></script>
  </body>
</html>
